<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Let's talk</title>
    <link rel="icon" type="image/png" href="assets/images/logo-navbar.png" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="rm-header">
      <nav class="rm-navbar">
        <div class="rm-logo">
          <a href="#">
            <img src="assets/images/rachna-logo.png" alt="logo" />
          </a>
        </div>
        <ul class="rm-menu">
          <li><a href="home.html">Home</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="about.html">About me</a></li>
          <li><a href="form.html" class="rm-btn">Let’s talk</a></li>
        </ul>
      </nav>
    </header>
    <section class="rm-contact-page">
      <div class="rm-contact-box">
        <!-- Left Side -->
        <div class="rm-contact-left">
          <h1>Lets Get<br />Started</h1>

          <p>
            The quality of your decisions depends on the clarity of your
            thinking. Start your transformation with me.
          </p>
        </div>

        <!-- Right Side -->
        <div class="rm-contact-right">
          <form>
            <div class="rm-field">
              <input type="text" placeholder="Full Name" />
            </div>

            <div class="rm-field">
              <input type="email" placeholder="Email Id" />
            </div>

            <div class="rm-field">
              <input type="text" placeholder="Mobile No." />
            </div>

            <div class="rm-field">
              <textarea placeholder="Your Message"></textarea>
            </div>

            <div class="rm-btn-area">
              <button type="submit" class="rm-outline-btn">
                Book a clarity call
              </button>

              <button type="submit" class="rm-fill-btn">
                Book a clarity call
              </button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
